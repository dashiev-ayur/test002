
services:
###> doctrine/doctrine-bundle ###
  database:
    image: postgres:${POSTGRES_VERSION:-16}-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgre}
      # You should definitely change the password in production
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgre}
      POSTGRES_USER: ${POSTGRES_USER:-postgre}
    healthcheck:
      test: ["CMD", "pg_isready", "-d", "${POSTGRES_DB:-postgre}", "-U", "${POSTGRES_USER:-postgre}"]
      timeout: 5s
      retries: 5
      start_period: 60s
    volumes:
      - database_data:/var/lib/postgresql/data:rw
      # You may use a bind-mounted host directory instead, so that it is harder to accidentally remove the volume and lose all your data!
      # - ./docker/db/data:/var/lib/postgresql/data:rw
###< doctrine/doctrine-bundle ###

  # Backend и frontend в Docker — в compose.prod.yaml (см. корневой README).

  # Redis — раскомментируйте сервис и том ниже, когда понадобится кэш/очереди через Redis.
  # Убедитесь, что в .env.local заданы REDIS_URL (или аналог), и при необходимости
  # добавьте секцию ports в compose.override.yaml, например "6379:6379".
  #
  # redis:
  #   image: redis:${REDIS_VERSION:-7}-alpine
  #   ports:
  #     - "6379"
  #   volumes:
  #     - redis_data:/data
  #   command: redis-server --appendonly yes

volumes:
###> doctrine/doctrine-bundle ###
  database_data:
